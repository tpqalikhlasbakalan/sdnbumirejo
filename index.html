        e.preventDefault();
        if (!selectedParentId || !newSubMenuLabel.trim()) return;

                        <form onSubmit={handleAddUser} className="space-y-3">
                          <input type="text" required value={newUserForm.name} onChange={e => setNewUserForm({...newUserForm, name: e.target.value})} placeholder="Nama Lengkap" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                          <input type="text" required value={newUserForm.username} onChange={e => setNewUserForm({...newUserForm, username: e.target.value})} placeholder="Username Login" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                          <input type="text" required value={newUserForm.password} onChange={e => setNewUserForm({...newUserForm, password: e.target.value})} placeholder="Password Awal" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                          <select value={newUserForm.role} onChange={e => setNewUserForm({...newUserForm, role: e.target.value})} className="w-full border p-2.5 rounded-lg text-sm outline-none">
                            <option value="Guru">Guru / Staf</option>
                            <option value="Admin">Administrator</option>
                          </select>
                          <button type="submit" className="w-full bg-slate-800 text-white font-bold py-2.5 rounded-lg text-sm mt-2">Buat Akun</button>
                        </form>
                      </div>

                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm lg:col-span-2">
                        <h3 className="font-bold text-slate-800 text-base mb-4">Daftar Pengelola Sistem</h3>
                        <div className="space-y-3">
                          {users.map(u => {
                            const firstLetter = u.name ? u.name.charAt(0).toUpperCase() : 'U';
                            return (
                              <div key={u.id} className="p-4 border border-slate-100 rounded-xl bg-slate-50 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                  <div className="w-10 h-10 rounded-full bg-amber-100 text-amber-700 font-bold flex items-center justify-center text-sm">{firstLetter}</div>
                                  <div>
                                    <p className="font-bold text-slate-800 text-sm">{u.name || 'Pengguna'}</p>
                                    <p className="text-xs text-slate-500">@{u.username || 'user'} <span className="mx-1">•</span> <span className={`font-semibold ${u.role === 'Admin' ? 'text-indigo-600' : 'text-emerald-600'}`}>{u.role || 'Guru'}</span></p>
                                  </div>
                                </div>
                                <div className="flex gap-2">
                                  <button type="button" onClick={() => handleResetPassword(u.id)} className="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-xs font-semibold hover:bg-slate-100">Reset Password</button>
                                  {users.length > 1 && (
                                    <button type="button" onClick={() => handleDeleteUser(u.id)} className="p-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100"><Icon name="trash" size={16}/></button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB MANAJEMEN MENU */}
                {activeTabAdmin === 'menu' && (
                  <div className="space-y-6 max-w-5xl">
                    <div className="grid lg:grid-cols-2 gap-6">
                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 className="font-bold text-slate-800 text-base mb-3"><Icon name="plus_h" className="text-amber-500 inline mr-1" /> Tambah Menu Utama</h3>
                        <form onSubmit={handleAddMenu} className="flex gap-2">
                          <input type="text" required value={newMenuLabel} onChange={(e) => setNewMenuLabel(e.target.value)} placeholder="Nama Menu..." className="flex-1 border p-2.5 rounded-lg text-sm outline-none focus:border-amber-500" />
                          <button type="submit" className="bg-slate-800 text-white font-bold px-4 py-2.5 rounded-lg text-xs">Simpan</button>
                        </form>
                      </div>
                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 className="font-bold text-slate-800 text-base mb-3"><Icon name="plus_h" className="text-amber-500 inline mr-1" /> Tambah Sub-Menu</h3>
                        <form onSubmit={handleAddSubMenu} className="space-y-3">
                          <select required value={selectedParentId} onChange={(e) => setSelectedParentId(e.target.value)} className="w-full border p-2.5 rounded-lg text-xs outline-none">
                            <option value="">Pilih Menu Utama</option>
                            {menus.filter(m => !m.isSystem).map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                          </select>
                          <input type="text" required value={newSubMenuLabel} onChange={(e) => setNewSubMenuLabel(e.target.value)} placeholder="Nama Sub-Menu..." className="w-full border p-2.5 rounded-lg text-xs outline-none" />
                          <button type="submit" className="w-full bg-slate-800 text-white font-bold px-4 py-2.5 rounded-lg text-xs">Simpan Sub-Menu</button>
                        </form>
                      </div>
                    </div>
                    
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="font-bold text-slate-800 text-base mb-4">Daftar Struktur Menu Saat Ini</h3>
                      <div className="space-y-3">
                        {menus.map((menu) => (
                          <div key={menu.id} className="p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
                            <div>
                              <div className="flex items-center gap-2">
                                <span className="font-bold text-slate-800">{menu.label}</span>
                                {menu.isSystem ? <span className="text-[9px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded font-bold uppercase">Sistem Bawaan</span> : <span className="text-[9px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold uppercase">Bisa Dihapus</span>}
                              </div>
                              {menu.submenus && menu.submenus.length > 0 && (
                                <div className="flex flex-wrap gap-2 mt-2">
                                  {menu.submenus.map((sub) => (
                                    <span key={sub.id} className="text-[11px] bg-white border border-slate-200 px-2.5 py-1 rounded-md font-semibold flex items-center gap-1.5 shadow-sm text-slate-600">
                                      {sub.label}
                                      <button type="button" onClick={() => handleDeleteSubMenu(menu.id, sub.id)} className="text-red-500 hover:text-red-700 ml-1 focus:outline-none">
                                        <Icon name="trash" size={14} />
                                      </button>
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                            {!menu.isSystem && (
                              <button type="button" onClick={() => handleDeleteMenu(menu.id)} className="bg-white border border-red-200 text-red-600 p-2 rounded-lg text-xs font-semibold hover:bg-red-50 transition focus:outline-none">
                                <Icon name="trash_all" size={16} />
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB EDIT KONTEN HALAMAN */}
                {activeTabAdmin === 'edit_konten' && (
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm max-w-5xl">
                    <h3 className="font-bold text-slate-800 text-base mb-4 flex items-center gap-2"><Icon name="fileEdit" className="text-amber-500"/> Edit Isi Halaman Menu Dinamis</h3>
                    <div className="grid md:grid-cols-3 gap-6">
                      <div className="md:col-span-1 space-y-4">
                        <div>
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Pilih Menu Utama</label>
                          <select value={editContentMenuId} onChange={(e) => { setEditContentMenuId(e.target.value); setEditContentSubId(''); }} className="w-full border p-2.5 rounded-lg text-sm outline-none">
                            <option value="">-- Pilih --</option>
                            {menus.filter(m => m.submenus && m.submenus.length > 0).map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Pilih Sub-Menu (Halaman)</label>
                          <select value={editContentSubId} onChange={(e) => setEditContentSubId(e.target.value)} disabled={!editContentMenuId} className="w-full border p-2.5 rounded-lg text-sm outline-none disabled:bg-slate-100">
                            <option value="">-- Pilih Halaman --</option>
                            {editContentMenuId && menus.find(m => m.id === editContentMenuId)?.submenus.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                          </select>
                        </div>
                      </div>
                      
                      <div className="md:col-span-2">
                        {editContentSubId ? (
                          <div className="space-y-3">
                            <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Teks / Konten Halaman</label>
                            <textarea 
                              rows={12} 
                              value={editContentText} 
                              onChange={(e) => setEditContentText(e.target.value)} 
                              className="w-full bg-slate-50 border p-4 rounded-xl text-sm focus:ring-2 focus:ring-amber-500 outline-none leading-relaxed" 
                            />
                            <div className="flex justify-end">
                              <button 
                                onClick={() => {
                                  handleSaveSubmenuContent(editContentMenuId, editContentSubId, editContentText);
                                  triggerNotification('Perubahan konten berhasil disimpan!');
                                }} 
                                className="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-6 py-2.5 rounded-xl text-sm flex items-center gap-1.5 transition"
                              >
                                <Icon name="save" size={16}/> Simpan Konten
                              </button>
                            </div>
                          </div>
                        ) : (
                          <div className="h-full flex items-center justify-center border-2 border-dashed border-slate-200 rounded-xl text-slate-400 p-8 text-center text-sm">
                            Pilih Menu Utama dan Sub-Menu di samping kiri untuk mulai mengedit teks halamannya di sini.
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB STATISTIK SEKOLAH */}
                {activeTabAdmin === 'statistik' && (
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm max-w-4xl">
                    <h3 className="font-bold text-slate-800 text-base mb-6 flex items-center gap-2">
                      <Icon name="barChart" className="text-amber-500"/> Pengaturan Data Statistik
                    </h3>
                    <div className="grid md:grid-cols-2 gap-6">
                      <div className="bg-slate-50 p-4 border border-slate-200 rounded-xl flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center shrink-0"><Icon name="users" size={24}/></div>
                        <div className="flex-1">
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Jumlah Murid Aktif</label>
                          <input type="number" value={stats.murid} onChange={(e) => setStats({...stats, murid: parseInt(e.target.value) || 0})} className="w-full border border-slate-300 p-2 rounded-lg text-sm outline-none focus:border-amber-500 font-bold" />
                        </div>
                      </div>
                      <div className="bg-slate-50 p-4 border border-slate-200 rounded-xl flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0"><Icon name="bookOpen" size={24}/></div>
                        <div className="flex-1">
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Jumlah Guru & Staf</label>
                          <input type="number" value={stats.guru} onChange={(e) => setStats({...stats, guru: parseInt(e.target.value) || 0})} className="w-full border border-slate-300 p-2 rounded-lg text-sm outline-none focus:border-amber-500 font-bold" />
                        </div>
                      </div>
                      <div className="bg-slate-50 p-4 border border-slate-200 rounded-xl flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center shrink-0"><Icon name="globe" size={24}/></div>
                        <div className="flex-1">
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Jumlah Ruang Kelas</label>
                          <input type="number" value={stats.kelas} onChange={(e) => setStats({...stats, kelas: parseInt(e.target.value) || 0})} className="w-full border border-slate-300 p-2 rounded-lg text-sm outline-none focus:border-amber-500 font-bold" />
                        </div>
                      </div>
                      <div className="bg-slate-50 p-4 border border-slate-200 rounded-xl flex items-center gap-4">
                        <div className="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shrink-0"><Icon name="award" size={24}/></div>
                        <div className="flex-1">
                          <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Jumlah Prestasi</label>
                          <input type="number" value={stats.prestasi} onChange={(e) => setStats({...stats, prestasi: parseInt(e.target.value) || 0})} className="w-full border border-slate-300 p-2 rounded-lg text-sm outline-none focus:border-amber-500 font-bold" />
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB PERPUSTAKAAN */}
                {activeTabAdmin === 'perpustakaan' && (
                  <div className="space-y-6 max-w-5xl">
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="font-bold text-slate-800 text-base mb-4"><Icon name="plus" size={16} className="text-amber-500 inline mr-1" /> Tambah Koleksi Buku</h3>
                      <form onSubmit={handleAddBook} className="grid md:grid-cols-2 gap-4">
                        <div className="space-y-3">
                          <input type="text" required value={newBookForm.title} onChange={e => setNewBookForm({...newBookForm, title: e.target.value})} placeholder="Judul Buku *" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                          <input type="text" required value={newBookForm.author} onChange={e => setNewBookForm({...newBookForm, author: e.target.value})} placeholder="Penulis/Penerbit *" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                        </div>
                        <div className="space-y-3">
                          <select value={newBookForm.category} onChange={e => setNewBookForm({...newBookForm, category: e.target.value})} className="w-full border p-2.5 rounded-lg text-sm outline-none">
                            <option value="Pelajaran">Buku Pelajaran</option>
                            <option value="Fiksi & Sastra">Fiksi & Sastra</option>
                            <option value="Pengetahuan">Pengetahuan Umum</option>
                            <option value="Agama">Buku Agama</option>
                          </select>
                          <input type="text" value={newBookForm.cover} onChange={e => setNewBookForm({...newBookForm, cover: e.target.value})} placeholder="URL Cover Buku (Opsional)" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                          <input type="text" value={newBookForm.driveLink} onChange={e => setNewBookForm({...newBookForm, driveLink: e.target.value})} placeholder="URL Link Google Drive (Buku PDF)" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                        </div>
                        <button type="submit" className="md:col-span-2 bg-slate-800 text-white font-bold py-3 rounded-xl text-sm mt-2">Masukan ke Database Perpustakaan</button>
                      </form>
                    </div>
                    
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="font-bold text-slate-800 text-base mb-4">Daftar Koleksi Buku ({libraryBooks.length})</h3>
                      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {libraryBooks.map(book => (
                          <div key={book.id} className="border border-slate-100 p-3 rounded-xl flex gap-4 bg-slate-50 items-center">
                            <img src={book.cover} alt={book.title} className="w-16 h-20 object-cover rounded-md shadow-sm shrink-0" />
                            <div className="flex-1">
                              <span className="text-[9px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded uppercase font-bold">{book.category}</span>
                              <h4 className="font-bold text-slate-800 text-xs mt-1.5 leading-snug line-clamp-2">{book.title}</h4>
                              <p className="text-[10px] text-slate-500 mt-1">{book.author}</p>
                              {book.driveLink && <span className="text-[9px] text-emerald-600 font-bold mt-1 inline-block"><Icon name="checkCircle" size={10} className="inline mr-0.5"/>Ada PDF File</span>}
                              <button type="button" onClick={() => handleDeleteBook(book.id)} className="text-red-500 text-[10px] font-bold mt-2 hover:underline block focus:outline-none">Hapus Koleksi</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB PPDB */}
                {activeTabAdmin === 'ppdb' && (
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm max-w-5xl">
                    <table className="w-full text-left text-sm border-collapse">
                      <thead>
                        <tr className="bg-slate-50 border-b border-slate-200 text-slate-600">
                          <th className="p-4 font-bold uppercase text-[11px]">Tgl Daftar</th>
                          <th className="p-4 font-bold uppercase text-[11px]">Nama Murid</th>
                          <th className="p-4 font-bold uppercase text-[11px]">Ortu/Wali</th>
                          <th className="p-4 font-bold uppercase text-[11px]">WhatsApp</th>
                          <th className="p-4 font-bold uppercase text-[11px]">Status</th>
                          <th className="p-4 font-bold uppercase text-[11px] text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody>
                        {ppdbSubmissions.map(sub => (
                          <tr key={sub.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                            <td className="p-4 text-slate-500 text-xs">{sub.tanggal || '-'}</td>
                            <td className="p-4 font-bold text-slate-800">{sub.nama}</td>
                            <td className="p-4 text-slate-600">{sub.orangtua}</td>
                            <td className="p-4 text-slate-600 font-mono">{sub.telepon}</td>
                            <td className="p-4">
                              <span className={`px-2.5 py-1 rounded-md text-[10px] font-bold ${sub.status === 'Terverifikasi' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}`}>
                                {sub.status}
                              </span>
                            </td>
                            <td className="p-4 text-right">
                              <div className="flex justify-end gap-1.5">
                                {sub.status !== 'Terverifikasi' && (
                                  <button type="button" onClick={() => handleVerifyPPDB(sub.id)} title="Verifikasi Pendaftar" className="bg-white border border-emerald-200 text-emerald-600 p-1.5 rounded-lg hover:bg-emerald-50 focus:outline-none">
                                    <Icon name="checkCircle" size={16}/>
                                  </button>
                                )}
                                <button type="button" onClick={() => setPpdbSubmissions(ppdbSubmissions.filter(p => p.id !== sub.id))} title="Hapus Data" className="bg-white border border-red-200 text-red-600 p-1.5 rounded-lg hover:bg-red-50 focus:outline-none">
                                  <Icon name="trash" size={16}/>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                        {ppdbSubmissions.length === 0 && (
                          <tr><td colSpan={6} className="p-8 text-center text-slate-400">Belum ada data pendaftar baru.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* TAB BERITA */}
                {activeTabAdmin === 'berita' && (
                  <div className="space-y-6 max-w-5xl">
                     <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 className="font-bold text-slate-800 text-base mb-4"><Icon name="plus" size={16} className="text-amber-500 inline mr-1" /> Buat Berita / Kegiatan</h3>
                        <form onSubmit={handleAddNews} className="space-y-3">
                           <input type="text" required value={newNewsTitle} onChange={e=>setNewNewsTitle(e.target.value)} placeholder="Judul Berita..." className="w-full p-2.5 border rounded-lg text-sm outline-none" />
                           <textarea required value={newNewsExcerpt} onChange={e=>setNewNewsExcerpt(e.target.value)} placeholder="Tuliskan singkasan/isi berita..." className="w-full p-2.5 border rounded-lg text-sm outline-none h-24" />
                           <input type="text" value={newNewsImage} onChange={e=>setNewNewsImage(e.target.value)} placeholder="URL Gambar Dokumentasi..." className="w-full p-2.5 border rounded-lg text-sm outline-none" />
                           <button type="submit" className="bg-slate-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold">Publikasikan</button>
                        </form>
                     </div>
                     <div className="grid md:grid-cols-2 gap-4">
                        {news.map(n => (
                           <div key={n.id} className="p-4 border border-slate-100 rounded-xl bg-white flex gap-4">
                             <img src={n.image} className="w-20 h-20 object-cover rounded-lg" />
                             <div>
                              <h4 className="font-bold text-sm text-slate-800 line-clamp-1">{n.title}</h4>
                              <p className="text-[11px] text-slate-500 line-clamp-2 mt-1">{n.excerpt}</p>
                              <button type="button" onClick={() => handleDeleteNews(n.id)} className="text-red-500 text-[11px] font-bold mt-2 focus:outline-none"><Icon name="trash" className="inline mr-1" size={12}/>Hapus Postingan</button>
                             </div>
                           </div>
                        ))}
                     </div>
                  </div>
                )}

                {/* TAB HERO SLIDER */}
                {activeTabAdmin === 'carousel' && (
                  <div className="space-y-4 max-w-5xl">
                     {carouselImages.map(slide => (
                        <div key={slide.id} className="p-6 bg-white border border-slate-200 rounded-2xl flex gap-6 items-center shadow-sm">
                           <img src={slide.url} className="w-32 h-24 object-cover rounded-xl shadow-inner shrink-0" />
                           <div className="flex-1 grid gap-3">
                              <input type="text" value={slide.url} onChange={e => setCarouselImages(carouselImages.map(c => c.id === slide.id ? {...c, url: e.target.value} : c))} className="p-2 text-xs border rounded-lg w-full bg-slate-50" placeholder="URL Gambar Slide" />
                              <input type="text" value={slide.title} onChange={e => setCarouselImages(carouselImages.map(c => c.id === slide.id ? {...c, title: e.target.value} : c))} className="p-2 text-xs font-bold border rounded-lg w-full bg-slate-50" placeholder="Judul Utama Slide" />
                              <input type="text" value={slide.desc} onChange={e => setCarouselImages(carouselImages.map(c => c.id === slide.id ? {...c, desc: e.target.value} : c))} className="p-2 text-xs border rounded-lg w-full bg-slate-50" placeholder="Deskripsi pendek" />
                           </div>
                    </div>
                 ))}
              </div>
            )}

          </main>
        </div>
      </div>
    );
  }

  // ==========================================
  // TAMPILAN 2: HALAMAN WEBSITE PUBLIK 
  // ==========================================
  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col font-sans">
      
      {/* TOP HEADER / BAR */}
      <div className={`${t.barBg} text-white text-xs md:text-sm py-2 px-4 md:px-8 flex justify-between items-center flex-wrap gap-2 transition-colors duration-500`}>
        <div className="flex items-center gap-4">
          <span className="flex items-center gap-1"><Icon name="phone" size={14} /> {schoolInfo.phone}</span>
          <span className="flex items-center gap-1"><Icon name="mail" size={14} /> {schoolInfo.email}</span>
        </div>
        
        <div className="flex items-center gap-3">
          {isLoggedIn ? (
            <div className="flex items-center gap-3">
              <span className="bg-emerald-500 text-white font-semibold px-2 py-0.5 rounded text-xs flex items-center gap-1 shadow-sm animate-pulse">
                <Icon name="shield" size={12} /> Pratinjau {currentUser?.role}
              </span>
              <button onClick={() => setCurrentView({ type: 'admin_panel' })} className={`px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition bg-amber-500 hover:bg-amber-400 text-slate-900 shadow-sm`}>
                <Icon name="layoutDashboard" size={14} /> Buka Dashboard
              </button>
            </div>
          ) : (
            <button onClick={() => setShowLoginModal(true)} className="bg-amber-50 hover:bg-amber-600 text-slate-900 font-bold px-3 py-1 rounded flex items-center gap-1 transition text-xs">
              <Icon name="lock" size={12} /> Login Pegawai
            </button>
          )}
        </div>
      </div>

      {/* BRAND & NAVIGATION (SEJAJAR / HORIZONTAL) */}
      <header className="bg-white shadow-md sticky top-0 z-40">
        <div className="w-full overflow-x-auto no-scrollbar">
          <div className="max-w-7xl mx-auto px-4 md:px-8 py-3 flex items-center gap-6 md:gap-10 min-w-max">
            
            {/* Logo & Nama Sekolah (Kiri) */}
            <div className="flex items-center gap-3 cursor-pointer shrink-0" onClick={() => setCurrentView({ type: 'beranda', submenuId: null })}>
              <div className={`${t.mainBg} p-2 rounded-xl text-amber-400 flex items-center justify-center transition-colors duration-500 shadow-sm`} style={{ width: '48px', height: '48px' }}>
                {schoolInfo.logo ? (
                  <img src={schoolInfo.logo} alt="Logo Sekolah" className="w-full h-full object-contain drop-shadow-sm rounded" />
                ) : (
                  <Icon name="award" size={30} />
                )}
              </div>
              <div>
                <h1 className={`text-xl md:text-2xl font-black ${t.mainText} tracking-tight leading-none transition-colors duration-500`}>
                  {schoolInfo.name.toUpperCase()}
                </h1>
                <p className="text-[10px] md:text-xs text-amber-500 font-bold tracking-wider mt-1 uppercase">
                  {schoolInfo.tagline}
                </p>
              </div>
            </div>

            {/* Navigation Bar */}
            <nav className="flex items-center gap-1 md:gap-2 border-l border-slate-200 pl-4 md:pl-8">
              {menus.map((menu) => (
                <div key={menu.id} className="relative group shrink-0">
                  <button
                    onClick={() => {
                      if (menu.id === 'beranda') setCurrentView({ type: 'beranda', submenuId: null });
                      else if (menu.id === 'ppdb') setCurrentView({ type: 'ppdb', submenuId: null });
                      else if (menu.id === 'perpustakaan') setCurrentView({ type: 'perpustakaan', submenuId: null });
                      else if (menu.id === 'berita') setCurrentView({ type: 'berita', submenuId: null });
                      else if (menu.submenus && menu.submenus.length > 0) {
                        setCurrentView({ type: 'submenu', parentMenuId: menu.id, submenuId: menu.submenus[0].id, content: menu.submenus[0].content, label: menu.submenus[0].label });
                      } else if (editMode && !menu.isSystem) {
                        setQuickSubParentId(menu.id); setShowQuickSubModal(true);
                      }
                    }}
                    className={`px-3 py-2 text-sm font-bold rounded-lg flex items-center gap-1 transition-colors duration-300 ${
                      (currentView.type === menu.id || (currentView.parentMenuId === menu.id && currentView.type === 'submenu'))
                        ? `${t.lightBg} ${t.mainText}` 
                        : `text-slate-600 ${t.hoverLighterBg} hover:text-slate-900`
                    }`}
                  >
                    {menu.label}
                    {((menu.submenus && menu.submenus.length > 0) || (editMode && !menu.isSystem)) && <Icon name="chevronDown" size={14} />}
                  </button>

                  {/* Submenu Dropdown */}
                  {((menu.submenus && menu.submenus.length > 0) || (editMode && !menu.isSystem)) && (
                    <div className="absolute left-0 mt-1 w-56 bg-white border border-slate-100 shadow-xl rounded-lg py-2 hidden group-hover:block z-50 transition-all">
                      {menu.submenus && menu.submenus.map((sub) => (
                        <button
                          key={sub.id}
                          onClick={() => setCurrentView({ type: 'submenu', parentMenuId: menu.id, submenuId: sub.id, content: sub.content, label: sub.label })}
                          className={`w-full text-left px-4 py-2 text-xs font-semibold ${t.hoverLighterBg} hover:${t.mainText} flex justify-between items-center transition-colors ${
                            currentView.submenuId === sub.id ? `${t.lighterBg} ${t.mainText} border-r-4 border-amber-500` : 'text-slate-600'
                          }`}
                        >
                          <span>{sub.label}</span>
                        </button>
                      ))}
                      {editMode && !menu.isSystem && (
                        <div className="px-2 pt-2 mt-2 border-t border-slate-100">
                          <button onClick={() => { setQuickSubParentId(menu.id); setShowQuickSubModal(true); }} className="w-full bg-amber-400 hover:bg-amber-500 text-slate-950 font-bold py-1.5 px-3 rounded-md text-[11px] flex items-center justify-center gap-1 transition">
                            <Icon name="plus" size={12} /> Tambah Sub-Menu
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </nav>

          </div>
        </div>
      </header>

      {/* CORE WEB VIEWS */}
      <main className="flex-grow">
        
        {/* ================= VIEW: BERANDA ================= */}
        {currentView.type === 'beranda' && (
          <div>
            {/* HERO SLIDER */}
            <div className={`relative h-[250px] md:h-[450px] overflow-hidden ${t.mainBg}`}>
              {carouselImages.map((img, idx) => (
                <div key={img.id} className={`absolute inset-0 transition-opacity duration-1000 flex items-center ${idx === currentSlide ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                  <img src={img.url} alt={img.title} className="w-full h-full object-cover opacity-60" />
                  <div className={`absolute inset-0 bg-gradient-to-t from-${activeTheme}-950/80 to-transparent`}></div>
                  <div className="absolute bottom-0 left-0 right-0 p-6 md:p-12 text-white max-w-4xl">
                    <span className="bg-amber-500 text-slate-900 font-bold px-3 py-1 rounded text-xs uppercase tracking-widest mb-2 inline-block">
                      {schoolInfo.name}
                    </span>
                    <h2 className="text-2xl md:text-4xl font-extrabold mb-2 md:mb-3 drop-shadow">{img.title}</h2>
                    <p className="text-sm md:text-lg text-slate-100 drop-shadow line-clamp-2 md:line-clamp-none">{img.desc}</p>
                  </div>
                </div>
              ))}
              <div className="absolute bottom-4 right-4 z-20 flex gap-2">
                {carouselImages.map((_, idx) => (
                  <button key={idx} onClick={() => setCurrentSlide(idx)} className={`w-3 h-3 rounded-full transition-all ${idx === currentSlide ? 'bg-amber-400 scale-125' : 'bg-white/60'}`}></button>
                ))}
              </div>
            </div>

            {/* STATS SECTION */}
            <div className={`${t.mainBg} text-white py-8 md:py-12 transition-colors duration-500`}>
              <div className="max-w-7xl mx-auto px-4 md:px-8">
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                  {[{ icon: 'users', val: stats.murid, label: 'Murid Aktif', key: 'murid' },
                    { icon: 'bookOpen', val: stats.guru, label: 'Guru & Staf', key: 'guru' },
                    { icon: 'globe', val: stats.kelas, label: 'Ruang Kelas', key: 'kelas' },
                    { icon: 'award', val: stats.prestasi, label: 'Sertifikat Prestasi', key: 'prestasi' }].map((stat, i) => (
                    <div key={i} className={`${t.statsBg} ${t.statsBorder} p-6 rounded-xl border relative group transition-colors duration-500`}>
                      <div className={`mx-auto w-12 h-12 bg-amber-400 ${t.mainText} rounded-full flex items-center justify-center mb-3 transition-colors`}><Icon name={stat.icon} size={24} /></div>
                      <div className="text-3xl md:text-4xl font-extrabold text-amber-400">{stat.val}+</div><div className="text-xs md:text-sm text-slate-300 font-bold tracking-wide uppercase mt-1">{stat.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* WELCOME */}
            <div className="max-w-7xl mx-auto px-4 md:px-8 py-16">
              <div className="bg-white border border-slate-100 rounded-3xl p-8 md:p-12 shadow-xl flex flex-col lg:flex-row items-center gap-12 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-400/10 rounded-full -mr-16 -mt-16"></div>
                <div className="w-48 h-48 md:w-64 md:h-64 rounded-2xl overflow-hidden shadow-md flex-shrink-0 relative group">
                  <img src={principalSpeech.photo} alt={principalSpeech.name} className="w-full h-full object-cover" />
                </div>
                <div className="flex-grow">
                  <span className="text-xs text-amber-500 font-black uppercase tracking-wider bg-amber-50 px-3 py-1.5 rounded-full">Sambut hangat kepsek</span>
                  <h3 className={`text-3xl font-black ${t.mainText} mt-4 leading-tight transition-colors`}>{principalSpeech.title}</h3>
                  <h4 className="text-amber-500 font-bold text-lg mt-1">{principalSpeech.name}</h4>
                  <div className="w-16 h-1 bg-amber-400 my-4 rounded-full"></div>
                  <p className="text-slate-600 leading-relaxed text-base italic md:text-lg">"{principalSpeech.text}"</p>
                </div>
              </div>
            </div>

            {/* PPDB FORM SECTION */}
            <div className="bg-slate-100 py-16">
              <div className="max-w-7xl mx-auto px-4 md:px-8">
                <div className="grid lg:grid-cols-12 gap-12 items-center">
                  <div className="lg:col-span-5 space-y-6">
                    <span className={`${t.mainBg} text-white font-bold px-3 py-1 rounded text-xs uppercase tracking-wider inline-block transition-colors`}>Tahun Ajaran 2026/2027</span>
                    <h2 className={`text-3xl md:text-4xl font-black ${t.mainText} leading-tight transition-colors`}>Pendaftaran Peserta Didik Baru (PPDB) Telah Dibuka!</h2>
                    <p className="text-slate-600">Berikan awal perjalanan akademik terbaik bagi putra-putri Anda. Proses pendaftaran mudah, cepat, dan transparan.</p>
                  </div>
                  <div className="lg:col-span-7">
                    <div className="bg-white rounded-3xl p-6 md:p-10 shadow-xl border border-slate-100">
                      <h3 className={`text-xl md:text-2xl font-black ${t.mainText} mb-1 transition-colors`}>Formulir Pengisian PPDB</h3>
                      <p className="text-xs text-slate-500 mb-6">Isi data calon murid secara lengkap di bawah ini.</p>
                      {ppdbSuccessMsg && (<div className="bg-emerald-50 border border-emerald-200 text-emerald-800 p-4 rounded-xl text-sm mb-6 flex items-center gap-2"><Icon name="check" size={18} className="text-emerald-500" /><span>{ppdbSuccessMsg}</span></div>)}
                      <form onSubmit={handlePpdbSubmit} className="space-y-4">
                        <div className="grid md:grid-cols-2 gap-4">
                          <input type="text" required value={ppdbForm.namaAnak} onChange={(e) => setPpdbForm({ ...ppdbForm, namaAnak: e.target.value })} placeholder="Nama Anak *" className={`w-full bg-slate-50 border border-slate-200 p-3 rounded-xl ${t.ring} text-sm outline-none`} />
                          <input type="text" required value={ppdbForm.namaOrtu} onChange={(e) => setPpdbForm({ ...ppdbForm, namaOrtu: e.target.value })} placeholder="Nama Orang Tua *" className={`w-full bg-slate-50 border border-slate-200 p-3 rounded-xl ${t.ring} text-sm outline-none`} />
                        </div>
                        <div className="grid md:grid-cols-2 gap-4">
                          <input type="tel" required value={ppdbForm.telp} onChange={(e) => setPpdbForm({ ...ppdbForm, telp: e.target.value })} placeholder="No WhatsApp *" className={`w-full bg-slate-50 border border-slate-200 p-3 rounded-xl ${t.ring} text-sm outline-none`} />
                          <input type="email" value={ppdbForm.email} onChange={(e) => setPpdbForm({ ...ppdbForm, email: e.target.value })} placeholder="Email Aktif" className={`w-full bg-slate-50 border border-slate-200 p-3 rounded-xl ${t.ring} text-sm outline-none`} />
                        </div>
                        <textarea rows={2} value={ppdbForm.alamat} onChange={(e) => setPpdbForm({ ...ppdbForm, alamat: e.target.value })} placeholder="Alamat rumah lengkap..." className={`w-full bg-slate-50 border border-slate-200 p-3 rounded-xl ${t.ring} text-sm outline-none`} />
                        <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold p-3.5 rounded-xl flex items-center justify-center gap-2 transition shadow-md">Kirim Pendaftaran</button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ================= VIEW: PERPUSTAKAAN DIGITAL ================= */}
        {currentView.type === 'perpustakaan' && (
          <div className="bg-slate-50 min-h-[70vh]">
            <div className={`${t.mainBg} text-white py-12 px-4 md:px-8`}>
               <div className="max-w-7xl mx-auto flex flex-col items-center text-center">
                  <div className="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mb-4"><Icon name="bookMarked" size={32} className="text-amber-400" /></div>
                  <h2 className="text-3xl md:text-4xl font-black mb-3">Katalog Perpustakaan Digital</h2>
                  <p className="text-slate-300 max-w-2xl mb-8">Eksplorasi koleksi buku pelajaran, fiksi, dan sains di perpustakaan pintar kami untuk mendukung literasi anak bangsa.</p>
                  <div className="relative w-full max-w-xl">
                    <input type="text" value={libSearchQuery} onChange={(e) => setLibSearchQuery(e.target.value)} placeholder="Cari judul buku atau nama penulis..." className="w-full pl-12 pr-4 py-4 rounded-full text-slate-800 focus:outline-none focus:ring-4 focus:ring-amber-500/50 shadow-lg" />
                    <Icon name="search" className="absolute left-4 top-4 text-slate-400" size={20} />
                  </div>
               </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 md:px-8 py-12">
               {filteredBooks.length > 0 ? (
                 <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                   {filteredBooks.map(book => (
                     <div 
                       key={book.id} 
                       className="bg-white rounded-2xl p-4 shadow-sm hover:shadow-xl transition-all border border-slate-100 flex flex-col group cursor-pointer"
                       onClick={() => {
                         if (book.driveLink) {
                            setReadingBook(book);
                         } else {
                            triggerNotification('Buku ini belum memiliki link PDF untuk dibaca.', 'error');
                         }
                       }}
                     >
                        <div className="h-48 rounded-xl overflow-hidden mb-4 bg-slate-100 relative">
                           <img src={book.cover} alt={book.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                           <div className="absolute top-2 left-2 bg-slate-900/80 text-white text-[9px] font-bold px-2 py-0.5 rounded backdrop-blur-sm uppercase">{book.category}</div>
                        </div>
                        <h4 className={`font-bold ${t.mainText} text-sm line-clamp-2 leading-tight mb-1 group-hover:text-amber-600 transition-colors`}>{book.title}</h4>
                        <p className="text-[11px] text-slate-500 mt-auto flex items-center gap-1.5"><Icon name="edit" size={10}/> {book.author}</p>
                     </div>
                   ))}
                 </div>
               ) : (
                 <div className="text-center py-20 text-slate-500">
                    <Icon name="search" size={48} className="mx-auto text-slate-300 mb-4" />
                    <h3 className="text-xl font-bold text-slate-700">Buku tidak ditemukan</h3>
                    <p className="text-sm mt-1">Coba gunakan kata kunci pencarian yang lain.</p>
                 </div>
               )}
            </div>
          </div>
        )}

        {/* ================= VIEW: DYNAMIC SUB-MENU ================= */}
        {currentView.type === 'submenu' && (
          <div className="max-w-7xl mx-auto px-4 md:px-8 py-16">
            <div className="bg-white border border-slate-100 rounded-3xl p-8 md:p-12 shadow-xl">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-100 pb-6 mb-8 gap-4">
                <div className="w-full">
                  <span className="text-xs text-amber-500 font-black uppercase tracking-wider">Halaman Informasi Sekolah</span>
                  <h2 className={`text-3xl md:text-4xl font-black ${t.mainText} mt-1`}>{currentView.label}</h2>
                </div>
              </div>
              <div className="prose max-w-none text-slate-700 leading-relaxed text-base md:text-lg whitespace-pre-line">{currentView.content}</div>
            </div>
          </div>
        )}

        {/* ================= VIEW: PPDB FULL PAGE ================= */}
        {currentView.type === 'ppdb' && (
          <div className="max-w-7xl mx-auto px-4 md:px-8 py-16">
            <div className="bg-white border border-slate-100 rounded-3xl p-8 md:p-12 shadow-xl">
              <div className="border-b border-slate-100 pb-6 mb-8">
                <span className="text-xs text-amber-500 font-black uppercase tracking-wider">Admisi Siswa Baru</span>
                <h2 className={`text-3xl md:text-4xl font-black ${t.mainText} mt-1`}>Penerimaan Peserta Didik Baru</h2>
              </div>
              <div className="grid lg:grid-cols-2 gap-12">
                <div className="space-y-6">
                  <h3 className={`text-xl font-bold ${t.mainText}`}>Syarat Pendaftaran Calon Murid</h3>
                  <ul className="space-y-3 text-slate-600 text-sm">
                    <li>🔹 Usia Minimal 6 Tahun per Juli tahun ajaran baru</li>
                    <li>🔹 Scan/FC Akta Kelahiran & Kartu Keluarga (KK)</li>
                    <li>🔹 Pas Foto Berwarna 3x4 (2 lembar)</li>
                  </ul>
                  <h3 className={`text-xl font-bold ${t.mainText} pt-4`}>Alur Pendaftaran</h3>
                  <div className="space-y-4 relative pl-6 border-l-2 border-amber-400">
                    {['Mengisi Form Online', 'Verifikasi Dokumen', 'Wawancara Observasi'].map((alur, i) => (
                      <div key={i} className="relative">
                        <div className={`absolute -left-9 top-0.5 ${t.mainBg} text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold`}>{i+1}</div>
                        <h4 className={`font-bold ${t.mainText} text-sm`}>{alur}</h4>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                  <h3 className={`text-lg font-bold ${t.mainText} mb-4`}>Mulai Pengisian PPDB Online</h3>
                  {ppdbSuccessMsg && (<div className="bg-emerald-50 border border-emerald-200 text-emerald-800 p-4 rounded-xl text-sm mb-4"><Icon name="check" size={18} className="inline mr-2 text-emerald-500" />{ppdbSuccessMsg}</div>)}
                  <form onSubmit={handlePpdbSubmit} className="space-y-4">
                    <input type="text" required value={ppdbForm.namaAnak} onChange={(e) => setPpdbForm({ ...ppdbForm, namaAnak: e.target.value })} placeholder="Nama Calon Murid *" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                    <input type="text" required value={ppdbForm.namaOrtu} onChange={(e) => setPpdbForm({ ...ppdbForm, namaOrtu: e.target.value })} placeholder="Nama Orang Tua *" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                    <input type="tel" required value={ppdbForm.telp} onChange={(e) => setPpdbForm({ ...ppdbForm, telp: e.target.value })} placeholder="No WhatsApp *" className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                    <textarea rows={2} value={ppdbForm.alamat} onChange={(e) => setPpdbForm({ ...ppdbForm, alamat: e.target.value })} placeholder="Alamat Rumah..." className="w-full border p-2.5 rounded-lg text-sm outline-none" />
                    <button type="submit" className={`w-full ${t.mainBg} text-white font-bold p-3 rounded-lg text-sm`}>Kirim Berkas Pendaftaran</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ================= VIEW: BERITA ================= */}
        {currentView.type === 'berita' && (
          <div className="max-w-7xl mx-auto px-4 md:px-8 py-16">
            <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
              <div>
                <span className="text-xs text-amber-500 font-black uppercase tracking-widest bg-amber-50 px-3 py-1">Pojok Info</span>
                <h2 className={`text-3xl font-black ${t.mainText} mt-1`}>Kegiatan & Berita Terkini</h2>
              </div>
            </div>
            <div className="grid md:grid-cols-3 gap-8">
              {news.map((item) => (
                <div key={item.id} className="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-lg hover:shadow-xl transition flex flex-col group">
                  <div className="h-48 overflow-hidden relative bg-slate-800">
                    <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                  </div>
                  <div className="p-6 flex-grow flex flex-col justify-between">
                    <div>
                      <span className="text-xs text-slate-400 font-semibold">{item.date}</span>
                      <h3 className={`text-lg font-bold ${t.mainText} mt-1.5 line-clamp-2 leading-snug`}>{item.title}</h3>
                      <p className="text-xs text-slate-500 mt-2 line-clamp-3 leading-relaxed">{item.excerpt}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </main>

      {/* FOOTER */}
      <footer className={`${t.mainBg} text-white border-t-4 border-amber-500 transition-colors duration-500`}>
        <div className="max-w-7xl mx-auto px-4 md:px-8 py-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <div className="space-y-4">
            <div className="flex items-center gap-2">
              <div className="bg-white/10 p-2 rounded-xl text-amber-400">
                {schoolInfo.logo ? <img src={schoolInfo.logo} className="w-6 h-6 object-contain" /> : <Icon name="award" size={24} />}
              </div>
              <h4 className="font-extrabold text-lg text-amber-400 tracking-wider uppercase">{schoolInfo.name}</h4>
            </div>
            <p className="text-xs text-slate-300 leading-relaxed">{schoolInfo.tagline}. Menyelenggarakan pendidikan inklusif dan modern.</p>
            <div className="flex gap-2">
              {Object.entries(schoolInfo.socials).map(([key, link]) => link && (
                <a key={key} href={link} target="_blank" rel="noreferrer" className="w-8 h-8 bg-white/5 hover:bg-amber-400 hover:text-slate-900 rounded-full flex items-center justify-center text-xs transition uppercase font-bold">{key}</a>
              ))}
            </div>
          </div>
          <div className="space-y-4">
            <h4 className="font-bold text-sm uppercase tracking-widest text-amber-400 border-b border-white/10 pb-2">Kontak Sekolah</h4>
            <div className="space-y-3 text-xs text-slate-300">
              <p className="flex items-start gap-2"><Icon name="mapPin" size={16} className="text-amber-400 shrink-0 mt-0.5" /> <span className="leading-tight">{schoolInfo.address}</span></p>
              <p className="flex items-center gap-2"><Icon name="phone" size={14} className="text-amber-400" /> {schoolInfo.phone}</p>
              <p className="flex items-center gap-2"><Icon name="mail" size={14} className="text-amber-400" /> {schoolInfo.email}</p>
            </div>
          </div>
          <div className="space-y-4">
            <h4 className="font-bold text-sm uppercase tracking-widest text-amber-400 border-b border-white/10 pb-2">Akses Cepat</h4>
            <ul className="space-y-2 text-xs text-slate-300">
              <li><button onClick={() => setCurrentView({ type: 'ppdb', submenuId: null })} className="hover:text-amber-400">Pendaftaran Murid Baru</button></li>
              <li><button onClick={() => setCurrentView({ type: 'perpustakaan', submenuId: null })} className="hover:text-amber-400">Perpustakaan Digital</button></li>
            </ul>
          </div>
        </div>
        <div className={`${t.footerBottom} py-4 px-4 text-center text-xs text-slate-400 border-t border-white/5`}>
          <p>© {new Date().getFullYear()} {schoolInfo.name}. Seluruh Hak Cipta Dilindungi.</p>
        </div>
      </footer>

      {/* QUICK ADD SUB-MENU MODAL */}
      {showQuickSubModal && (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full relative border border-slate-100 shadow-2xl">
            <button onClick={() => setShowQuickSubModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="x" size={20} /></button>
            <div className="text-center mb-4">
              <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-2"><Icon name="plus" size={20} /></div>
              <h3 className="text-base font-black text-slate-800">Tambah Sub-Menu</h3>
            </div>
            <form onSubmit={handleQuickSubmenuSubmit} className="space-y-3">
              <input type="text" required value={quickSubLabel} onChange={(e) => setQuickSubLabel(e.target.value)} placeholder="Nama Sub-Menu Baru..." className="w-full bg-slate-50 border p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-amber-400" />
              <button type="submit" className={`w-full ${t.mainBg} text-white font-bold py-3 rounded-xl text-sm transition`}>Buat Halaman</button>
            </form>
          </div>
        </div>
      )}

      {/* LOGIN MODAL */}
      {showLoginModal && (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full relative">
            <button onClick={() => setShowLoginModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><Icon name="x" size={20} /></button>
            <div className="text-center mb-6">
              <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="lock" size={22} /></div>
              <h3 className={`text-xl font-black ${t.mainText}`}>Akses CMS Pengelola</h3>
            </div>
            <form onSubmit={handleLogin} className="space-y-4">
              <input type="text" value={loginInputUser} onChange={e=>setLoginInputUser(e.target.value)} placeholder="Masukkan Username" className={`w-full bg-slate-50 border p-3 rounded-xl ${t.ring} text-sm outline-none`} required />
              <input type="password" value={loginInputPass} onChange={e=>setLoginInputPass(e.target.value)} placeholder="Masukkan Password" className={`w-full bg-slate-50 border p-3 rounded-xl ${t.ring} text-sm outline-none`} required />
              <div className="space-y-2 pt-2">
                <button type="submit" className={`w-full ${t.mainBg} text-white font-bold p-3 rounded-xl text-sm`}>Masuk Pengelola</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* READING MODAL (Membaca Buku Langsung) */}
      {readingBook && (
        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col p-4 md:p-8">
          <div className="flex justify-between items-center bg-white p-4 rounded-t-2xl shadow-lg border-b border-slate-200">
            <div>
              <h3 className="font-bold text-lg text-slate-800 line-clamp-1">{readingBook.title}</h3>
              <p className="text-xs text-slate-500 font-semibold">{readingBook.author}</p>
            </div>
            <div className="flex gap-2 shrink-0">
              <a 
                href={readingBook.driveLink} 
                target="_blank" 
                rel="noreferrer" 
                className="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-1.5 transition"
              >
                <Icon name="download" size={16} /> <span className="hidden sm:inline">Unduh Buku</span>
              </a>
              <button 
                onClick={() => setReadingBook(null)} 
                className="bg-slate-100 hover:bg-red-50 text-slate-700 hover:text-red-600 p-2.5 rounded-xl transition border border-slate-200"
              >
                <Icon name="x" size={20} />
              </button>
            </div>
          </div>
          <div className="flex-1 bg-slate-200 rounded-b-2xl overflow-hidden w-full h-full relative">
            <iframe 
              src={getPreviewLink(readingBook.driveLink)} 
              className="w-full h-full absolute inset-0 border-0"
              allow="autoplay"
            ></iframe>
          </div>
        </div>
      )}

      {/* CUSTOM TOAST NOTIFICATION SYSTEM (Pengganti alert bawaan browser agar estetis) */}
      {notification.show && (
        <div className="fixed bottom-6 right-6 z-50 animate-bounce">
          <div className={`flex items-center gap-3 px-5 py-4 rounded-2xl shadow-2xl text-white font-bold text-sm ${notification.type === 'error' ? 'bg-red-600 border-l-4 border-red-800' : 'bg-slate-900 border-l-4 border-emerald-500'}`}>
            <Icon name={notification.type === 'error' ? 'x' : 'checkCircle'} size={18} />
            <span>{notification.message}</span>
          </div>
        </div>
      )}

    </div>
  );
}

// Render Aplikasi langsung ke elemen DOM root
const root = ScroogeDom = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
